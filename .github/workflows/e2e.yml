name: e2e

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install client dependencies
        working-directory: src/bookacall.client
        run: npm ci

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run TypeScript e2e tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Build .NET e2e tests
        run: dotnet build tests/BookACall.E2e.Tests/BookACall.E2e.Tests.csproj

      - name: Install Playwright browsers for .NET
        run: pwsh tests/BookACall.E2e.Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run .NET e2e tests
        run: dotnet test tests/BookACall.E2e.Tests/BookACall.E2e.Tests.csproj --no-build

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
